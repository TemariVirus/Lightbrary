<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Live room availability dashboard for Lightbrary.">
    <title>Lightbrary — Room Status</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:         #111;
        --surface:    #1a1a1a;
        --border:     #2e2e2e;
        --text:       #ddd;
        --muted:      #666;
        --available:  #4caf50;
        --occupied:   #e07b39;
        --offline:    #555;
      }

      body {
        font-family: system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        font-size: 14px;
        line-height: 1.5;
      }

      .shell {
        max-width: 860px;
        margin: 0 auto;
        padding: 2rem 1rem 4rem;
      }

      /* Header */
      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 2rem;
        padding-bottom: .75rem;
        border-bottom: 1px solid var(--border);
      }

      h1 {
        font-size: 1rem;
        font-weight: 600;
        color: var(--text);
      }

      #last-updated {
        font-size: .8rem;
        color: var(--muted);
      }

      /* Section label */
      .label {
        font-size: .75rem;
        text-transform: uppercase;
        letter-spacing: .06em;
        color: var(--muted);
        margin-bottom: .6rem;
      }

      section { margin-bottom: 2.5rem; }

      /* Overview cards */
      .overview-grid {
        display: flex;
        flex-wrap: wrap;
        gap: .5rem;
        margin-bottom: 2.5rem;
      }

      .room-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: .65rem 1rem;
        min-width: 120px;
      }

      .room-card-name {
        font-size: .72rem;
        text-transform: uppercase;
        letter-spacing: .05em;
        color: var(--muted);
        margin-bottom: .25rem;
      }

      .room-card-status {
        font-size: .9rem;
        font-weight: 600;
      }

      .room-card-status.Available { color: var(--available); }
      .room-card-status.Occupied  { color: var(--occupied); }
      .room-card-status.Offline   { color: var(--offline); }

      /* Filter bar */
      .filters {
        display: flex;
        gap: .5rem;
        margin-bottom: .75rem;
        flex-wrap: wrap;
      }

      .filters input,
      .filters select {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        font-size: .8rem;
        padding: .3rem .6rem;
        border-radius: 3px;
        outline: none;
      }

      .filters input::placeholder { color: var(--muted); }

      .filters input:focus,
      .filters select:focus {
        border-color: #444;
      }

      .filters select option { background: #1a1a1a; }

      /* Time preset buttons */
      .time-presets {
        display: flex;
        gap: 2px;
      }

      .preset-btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
        font-size: .75rem;
        padding: .25rem .55rem;
        cursor: pointer;
        border-radius: 3px;
        line-height: 1.4;
      }

      .preset-btn:hover { color: var(--text); border-color: #444; }

      .preset-btn.active {
        background: var(--surface);
        color: var(--text);
        border-color: #555;
      }



      /* History */
      .history-wrap {
        border: 1px solid var(--border);
        border-radius: 3px;
      }

      .history-header {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: .75rem;
        padding: .45rem .75rem;
        border-bottom: 1px solid var(--border);
      }

      .history-header span {
        font-size: .72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: .06em;
        color: var(--muted);
      }

      .history-entry {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: .75rem;
        align-items: center;
        padding: .5rem .75rem;
        border-bottom: 1px solid var(--border);
      }

      .history-entry:last-child { border-bottom: none; }
      .history-entry.hidden { display: none; }

      .entry-room {
        font-size: .85rem;
        color: var(--text);
      }

      .entry-status {
        font-size: .78rem;
        font-weight: 500;
      }

      .entry-status.Available { color: var(--available); }
      .entry-status.Occupied  { color: var(--occupied); }
      .entry-status.Offline   { color: var(--offline); }

      .entry-time {
        font-size: .75rem;
        color: var(--muted);
        text-align: right;
        white-space: nowrap;
      }

      .history-empty {
        padding: 1rem .75rem;
        color: var(--muted);
        font-size: .85rem;
      }

      /* Specific date picker */
      .date-filter {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--muted);
        font-size: .75rem;
        padding: .25rem .5rem;
        border-radius: 3px;
        cursor: pointer;
        line-height: 1.4;
        outline: none;
        color-scheme: dark;
      }
      .date-filter::-webkit-calendar-picker-indicator { filter: invert(.4); cursor: pointer; }
      .date-filter:focus, .date-filter:not(:placeholder-shown) { border-color: #555; color: var(--text); }
    </style>
  </head>
  <body>
    <div class="shell">

      <header>
        <h1>Lightbrary / Room Status</h1>
        <span id="last-updated">Live</span>
      </header>

      <!-- Overview -->
      <div class="overview-grid" id="overview-grid">
        {% for room in rooms %}
        <div class="room-card" id="ov-{{ room.room }}">
          <div class="room-card-name">{{ room.room }}</div>
          <div class="room-card-status {{ room.status }}">{{ room.status }}</div>
        </div>
        {% endfor %}
      </div>


      <!-- History -->
      <section id="history-section">
        <p class="label">Status History</p>

        <div class="filters">
          <input id="hist-filter-room" type="text" placeholder="Filter by room…" autocomplete="off">
          <select id="hist-filter-status">
            <option value="">All statuses</option>
            <option value="Available">Available</option>
            <option value="Occupied">Occupied</option>
            <option value="Offline">Offline</option>
          </select>
          <div class="time-presets" id="hist-time-presets">
            <button class="preset-btn active" data-sec="0">All</button>
            <button class="preset-btn" data-sec="900">15m</button>
            <button class="preset-btn" data-sec="3600">1h</button>
            <button class="preset-btn" data-sec="21600">6h</button>
            <button class="preset-btn" data-sec="86400">Today</button>
          </div>
          <input id="hist-filter-date" type="date" class="date-filter" title="Filter by specific date">
        </div>

        <div class="history-wrap">
          <div class="history-header">
            <span>Room</span>
            <span>Status</span>
            <span>Time</span>
          </div>
          <div id="history-feed">
            {% for change in changes | reverse %}
            <div class="history-entry" data-room="{{ change.room }}" data-status="{{ change.status }}" data-ts="{{ change.time }}">
              <span class="entry-room">{{ change.room }}</span>
              <span class="entry-status {{ change.status }}">{{ change.status }}</span>
              <span class="entry-time" data-time="{{ change.time }}"></span>
            </div>
            {% else %}
            <div class="history-empty">No status changes recorded yet.</div>
            {% endfor %}
          </div>
        </div>
      </section>

    </div>

    <script>
      function fmt(unixSec) {
        return new Date(unixSec * 1000).toLocaleString(undefined, {
          month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit', second: '2-digit',
        });
      }

      // ── Render initial history times ─────────────────────────────────────────

      document.querySelectorAll('[data-time]').forEach(el => {
        el.textContent = fmt(Number(el.dataset.time));
      });

      // ── Filters: history feed ────────────────────────────────────────────────

      const histFilterRoom   = document.getElementById('hist-filter-room');
      const histFilterStatus = document.getElementById('hist-filter-status');
      const histFilterDate   = document.getElementById('hist-filter-date');
      const feed             = document.getElementById('history-feed');
      let histWindowSec      = 0;
      let histDateRange      = null;

      function applyHistFilter() {
        const roomQ   = histFilterRoom.value.trim().toLowerCase();
        const statusQ = histFilterStatus.value;
        let cutoffFrom = 0, cutoffTo = Infinity;
        if (histDateRange) {
          cutoffFrom = histDateRange.from;
          cutoffTo   = histDateRange.to;
        } else if (histWindowSec) {
          cutoffFrom = Math.floor(Date.now() / 1000) - histWindowSec;
        }
        feed.querySelectorAll('.history-entry[data-room]').forEach(el => {
          const t = Number(el.dataset.ts);
          const matchRoom   = !roomQ   || el.dataset.room.toLowerCase().includes(roomQ);
          const matchStatus = !statusQ || el.dataset.status === statusQ;
          const matchTime   = t >= cutoffFrom && t <= cutoffTo;
          el.classList.toggle('hidden', !(matchRoom && matchStatus && matchTime));
        });
      }

      histFilterRoom.addEventListener('input', applyHistFilter);
      histFilterStatus.addEventListener('change', applyHistFilter);

      histFilterDate.addEventListener('change', () => {
        if (histFilterDate.value) {
          const d = new Date(histFilterDate.value);
          histDateRange  = { from: d.getTime() / 1000, to: d.getTime() / 1000 + 86399 };
          histWindowSec  = 0;
          document.querySelectorAll('#hist-time-presets .preset-btn').forEach(b => b.classList.remove('active'));
        } else {
          histDateRange = null;
          document.querySelector('#hist-time-presets .preset-btn[data-sec="0"]').classList.add('active');
        }
        applyHistFilter();
      });

      document.querySelectorAll('#hist-time-presets .preset-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#hist-time-presets .preset-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          histWindowSec = Number(btn.dataset.sec);
          histDateRange = null;
          histFilterDate.value = '';
          applyHistFilter();
        });
      });

      // ── Overview card upsert ─────────────────────────────────────────────────

      const overviewGrid = document.getElementById('overview-grid');

      function upsertCard(room, status) {
        let card = document.getElementById('ov-' + room);
        if (!card) {
          card = document.createElement('div');
          card.className = 'room-card';
          card.id = 'ov-' + room;
          card.innerHTML = `<div class="room-card-name">${room}</div><div class="room-card-status"></div>`;
          overviewGrid.appendChild(card);
        }
        const s = card.querySelector('.room-card-status');
        s.className   = `room-card-status ${status}`;
        s.textContent = status;
      }

      // ── History prepend ──────────────────────────────────────────────────────

      function prependEntry(room, status, time) {
        // Deduplicate: skip if this exact entry already exists
        if (feed.querySelector(`.history-entry[data-room="${room}"][data-ts="${time}"]`)) return;

        const empty = feed.querySelector('.history-empty');
        if (empty) empty.remove();

        const el = document.createElement('div');
        el.className = 'history-entry';
        el.dataset.room   = room;
        el.dataset.status = status;
        el.dataset.ts     = time;
        el.innerHTML = `
          <span class="entry-room">${room}</span>
          <span class="entry-status ${status}">${status}</span>
          <span class="entry-time">${fmt(time)}</span>`;
        feed.insertBefore(el, feed.firstChild);
        applyHistFilter();
      }

      // ── Polling ──────────────────────────────────────────────────────────────

      // Seed lastTimestamp from the most recent history entry on the page
      let lastTimestamp = 0;
      document.querySelectorAll('.history-entry[data-ts]').forEach(el => {
        const t = Number(el.dataset.ts);
        if (t > lastTimestamp) lastTimestamp = t;
      });

      const updatedEl = document.getElementById('last-updated');
      let secondsSinceUpdate = 0;

      function updateHeader() {
        updatedEl.textContent = secondsSinceUpdate === 0
          ? 'just updated'
          : `updated ${secondsSinceUpdate}s ago`;
      }

      async function poll() {
        try {
          const res = await fetch(`/api/status?timestamp=${lastTimestamp}`);
          if (!res.ok) throw new Error(res.status);
          const data = await res.json();

          // Prepend any new history entries
          if (data.changes && data.changes.length > 0) {
            const sorted = [...data.changes].sort((a, b) => a.time - b.time);
            sorted.forEach(c => prependEntry(c.room, c.status, c.time));
          }

          // Reconcile room cards from the authoritative rooms list (1 card per room)
          if (data.rooms && data.rooms.length > 0) {
            data.rooms.forEach(r => upsertCard(r.room, r.status));
          }

          lastTimestamp = data.changes.reduce((acc, change) => Math.max(change.time , acc), lastTimestamp)

          secondsSinceUpdate = 0;
          updatedEl.style.color = '';
          updateHeader();
        } catch (err) {
          console.error('Poll failed:', err);
          updatedEl.style.color = 'var(--occupied)';
        }
      }

      setInterval(poll, 2000);
      setInterval(() => { secondsSinceUpdate++; updateHeader(); }, 1000);
    </script>
  </body>
</html>
