#!/usr/sbin/nft -f

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0;
        policy drop;

        # Allow traffic from the Pi itself
        iifname "lo" accept

        # Keep existing valid connections working
        ct state established,related accept
        ct state invalid drop

        # Allow IPv6 neighbour discovery and related control traffic
        meta l4proto ipv6-icmp accept

        # Allow ping from the Lightbrary LAN
        ip saddr 192.168.1.0/24 ip protocol icmp accept

        # Allow any SSH administration from any reachable network
        tcp dport 22 accept

        # Allow DNS queries from the Lightbrary LAN
        ip saddr 192.168.1.0/24 udp dport 53 accept
        ip saddr 192.168.1.0/24 tcp dport 53 accept

        # Allow Room Pis to publish MQTT messages
        ip saddr 192.168.1.128/25 tcp dport 1883 accept

        # Allow access to Flask development dashboard
        ip saddr 192.168.1.0/25 tcp dport 3000 accept

        # Allow normal HTTP and HTTPS if used
        ip saddr 192.168.1.0/25 tcp dport { 80, 443 } accept
    }

    chain forward {
        type filter hook forward priority 0;
        policy drop;
    }

    chain output {
        type filter hook output priority 0;
        policy accept;
    }
}
