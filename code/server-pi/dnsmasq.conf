# Configuration file for dnsmasq.
#
# Format is one option per line, legal options are the same
# as the long options legal on the command line. See
# "/usr/sbin/dnsmasq --help" or "man 8 dnsmasq" for details.

# The following two options make you a better netizen, since they
# tell dnsmasq to filter out queries which the public DNS cannot
# answer, and which load the servers (especially the root servers)
# unnecessarily. If you have a dial-on-demand link they also stop
# these requests from bringing up the link unnecessarily.

# Never forward plain names (without a dot or domain part)
domain-needed
# Never forward addresses in the non-routed address spaces.
bogus-priv

############################
# LIGHTBRARY CONFIGURATION #
############################

# DHCP Configuration

# Assign the gateway an IP address (192.168.1.0/30)
dhcp-option=192.168.1.1
# Assign the DNS server (192.168.1.252/30)
dhcp-option=192.168.1.253

# Assign 125 IP addresses for clients that want to access the dashboard (192.168.1.0/25)
dhcp-range=192.168.1.2,192.168.1.126, 24h

# Assign IP addresses for the room raspberry pi servers (192.168.1.240/29)
dhcp-host=e4:5f:01:ed:f5:a0,roompi1,192.168.1.241
dhcp-host=e4:5f:01:bb:e8:4c,roompi2,192.168.1.242

# DNS Configuration

listen-address=127.0.0.1,192.168.1.253

address=/dashboard.lightbrary/192.168.1.253
address=/roompi1.lightbrary/192.168.1.241
address=/roompi2.lightbrary/192.168.1.242
