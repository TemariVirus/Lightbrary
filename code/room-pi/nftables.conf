#!/usr/sbin/nft -f

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0;
        policy drop;

        # Allow traffic generated by this Pi itself
        iifname "lo" accept

        # Allow replies to connections started by this Pi
        ct state established,related accept
        ct state invalid drop

        # Keep necessary IPv6 control traffic working
        meta l4proto ipv6-icmp accept

        # Allow ping from devices on the Lightbrary LAN
        ip saddr 192.168.1.0/24 ip protocol icmp accept

        # Allow SSH administration from the Lightbrary LAN
        tcp dport 22 accept
    }

    chain forward {
        type filter hook forward priority 0;
        policy drop;
    }

    chain output {
        type filter hook output priority 0;
        policy accept;
    }
}
